tables:
  # Batch data
  customers:
    file_type: "csv"
    required_columns:
      - "customer_id"
      - "full_name"
      - "email"
      - "phone"
      - "region_id"
      - "segment_id"
      - "signup_date"
      - "gender"
      - "created_at"
      - "updated_at"
    types:
      customer_id: "int"
      full_name: "string"
      email: "string"
      phone: "string"
      region_id: "int"
      segment_id: "int"
      signup_date: "date"
      gender: "string"
      created_at: "timestamp"
      updated_at: "timestamp"
    primary_key: "customer_id"
    formats:
      email: "email"
      phone: "phone"
      # signup_date: "date"

  drivers:
    file_type: "csv"
    required_columns:
      - "driver_id"
      - "driver_name"
      - "driver_phone"
      - "national_id"
      - "region_id"
      - "shift"
      - "vehicle_type"
      - "hire_date"
      - "rating_avg"
      - "on_time_rate"
      - "cancel_rate"
      - "completed_deliveries"
      - "is_active"
      - "created_at"
      - "updated_at"
    types:
      driver_id: "int"
      driver_name: "string"
      driver_phone: "string"
      national_id: "string"
      region_id: "int"
      shift: "string"
      vehicle_type: "string"
      hire_date: "date"
      rating_avg: "float"
      on_time_rate: "float"
      cancel_rate: "float"
      completed_deliveries: "int"
      is_active: "boolean"
      created_at: "timestamp"
      updated_at: "timestamp"
    primary_key: "driver_id"
    formats:
      driver_phone: "phone"
      # hire_date: "date"

  restaurants:
    file_type: "json"
    required_columns:
      - "restaurant_id"
      - "restaurant_name"
      - "region_id"
      - "category_id"
      - "price_tier"
      - "rating_avg"
      - "prep_time_avg_min"
      - "is_active"
      - "created_at"
      - "updated_at"
    types:
      restaurant_id: "int"
      restaurant_name: "string"
      region_id: "int"
      category_id: "int"
      price_tier: "string"
      rating_avg: "float"
      prep_time_avg_min: "int"
      is_active: "boolean"
      created_at: "timestamp"
      updated_at: "timestamp"
    primary_key: "restaurant_id"
    formats:


  agents:
    file_type: "csv"
    required_columns:
      - "agent_id"
      - "agent_name"
      - "agent_email"
      - "agent_phone"
      - "team_id"
      - "skill_level"
      - "hire_date"
      - "avg_handle_time_min"
      - "resolution_rate"
      - "csat_score"
      - "is_active"
      - "created_at"
      - "updated_at"
    types:
      agent_id: "int"
      agent_name: "string"
      agent_email: "string"
      agent_phone: "string"
      team_id: "int"
      skill_level: "string"
      hire_date: "date"
      avg_handle_time_min: "float"
      resolution_rate: "float"
      csat_score: "float"
      is_active: "boolean"
      created_at: "timestamp"
      updated_at: "timestamp"
    primary_key: "agent_id"
    formats:
      # hire_date: "date"
      agent_email: "email"
      agent_phone: "phone"


  teams:
    file_type: "csv"
    required_columns:
      - "team_id"
      - "team_name"
    types:
      team_id: "int"
      team_name: "string"
    primary_key: "team_id"
    formats:

  channels:
    file_type: "csv"
    required_columns:
      - "channel_id"
      - "channel_name"
    types:
      channel_id: "int"
      channel_name: "string"
    primary_key: "channel_id"
    formats:

  priorities:
    file_type: "csv"
    required_columns:
      - "priority_id"
      - "priority_code"
      - "priority_name"
      - "sla_first_response_min"
      - "sla_resolution_min"
    types:
      priority_id: "int"
      priority_code: "string"
      priority_name: "string"
      sla_first_response_min: "int"
      sla_resolution_min: "int"
    primary_key: "priority_id"
    formats:

  reason_categories:
    file_type: "csv"
    required_columns:
      - "reason_category_id"
      - "category_name"
    types:
      reason_category_id: "int"
      category_name: "string"
    primary_key: "reason_category_id"
    formats:

  cities:
    file_type: "json"
    required_columns:
      - "city_id"
      - "city_name"
      - "country"
      - "timezone"
    types:
      city_id: "int"
      city_name: "string"
      country: "string"
      timezone: "string"
    primary_key: "city_id"
    formats:

  categories:
    file_type: "csv"
    required_columns:
      - "category_id"
      - "category_name"
    types:
      category_id: "int"
      category_name: "string"
    primary_key: "category_id"
    formats:

  regions:
    file_type: "csv"
    required_columns:
      - "region_id"
      - "region_name"
      - "city_id"
      - "delivery_base_fee"
    types:
      region_id: "int"
      region_name: "string"
      city_id: "int"
      delivery_base_fee: "float"
    primary_key: "region_id"
    formats:

  segments:
    file_type: "csv"
    required_columns:
      - "segment_id"
      - "segment_name"
      - "discount_pct"
      - "priority_support"
    types:
      segment_id: "int"
      segment_name: "string"
      discount_pct: "float"
      priority_support: "boolean"
    primary_key: "segment_id"
    formats:

  reasons:
    file_type: "csv"
    required_columns:
      - "reason_id"
      - "reason_name"
      - "reason_category_id"
      - "severity_level"
      - "typical_refund_pct"
    types:
      reason_id: "int"
      reason_name: "string"
      reason_category_id: "int"
      severity_level: "string"
      typical_refund_pct: "float"
    primary_key: "reason_id"
    formats:

  # Stream data
  orders:
    file_type: "json"
    required_columns:
      - "order_id"
      - "customer_id"
      - "restaurant_id"
      - "driver_id"
      - "region_id"
      - "order_amount"
      - "delivery_fee"
      - "discount_amount"
      - "total_amount"
      - "order_status"
      - "payment_method"
      - "order_created_at"
      - "delivered_at"
    types:
      order_id: "string"
      customer_id: "int"
      restaurant_id: "int"
      driver_id: "int"
      region_id: "int"
      order_amount: "float"
      delivery_fee: "float"
      discount_amount: "float"
      total_amount: "float"
      order_status: "string"
      payment_method: "string"
      order_created_at: "timestamp"
      delivered_at: "timestamp"
    primary_key: "order_id"
    formats:


  tickets:
    file_type: "csv"
    required_columns:
      - "ticket_id"
      - "order_id"
      - "customer_id"
      - "driver_id"
      - "restaurant_id"
      - "agent_id"
      - "reason_id"
      - "priority_id"
      - "channel_id"
      - "status"
      - "refund_amount"
      - "created_at"
      - "first_response_at"
      - "resolved_at"
      - "sla_first_due_at"
      - "sla_resolve_due_at"
    types:
      ticket_id: "string"
      order_id: "string"
      customer_id: "int"
      driver_id: "int"
      restaurant_id: "int"
      agent_id: "int"
      reason_id: "int"
      priority_id: "int"
      channel_id: "int"
      status: "string"
      refund_amount: "float"
      created_at: "timestamp"
      first_response_at: "timestamp"
      resolved_at: "timestamp"
      sla_first_due_at: "timestamp"
      sla_resolve_due_at: "timestamp"
    primary_key: "ticket_id"
    formats:


  ticket_events:
    file_type: "json"
    required_columns:
      - "event_id"
      - "ticket_id"
      - "agent_id"
      - "event_ts"
      - "old_status"
      - "new_status"
      - "notes"
    types:
      event_id: "string"
      ticket_id: "string"
      agent_id: "int"
      event_ts: "timestamp"
      old_status: "string"
      new_status: "string"
      notes: "string"
    primary_key: "event_id"
    formats: